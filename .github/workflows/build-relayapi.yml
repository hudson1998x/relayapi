name: Build RelayApi

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Relay/RelayApi/Source/RelayApi.csproj

      - name: Build
        run: dotnet build Relay/RelayApi/Source/RelayApi.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Relay/RelayApi/Source/RelayApi.csproj -c Release --no-build -o ./nupkg

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        with:
          user: hudson1998x

      - name: NuGet push
        run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RelayApi-nupkg
          path: ./nupkg/*.nupkg
